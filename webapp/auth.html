<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Авторизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        .logo {
            margin-top: 16px;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            color: var(--tg-theme-text-color, #000000);
        }

        .logo span {
            color: #FF6914;
        }

        .steps {
            width: 100%;
            max-width: 360px;
            margin-bottom: 24px;
            padding: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
        }

        .steps-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000000);
        }

        .step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.4;
            color: var(--tg-theme-text-color, #333333);
        }

        .step:last-child {
            margin-bottom: 0;
        }

        .step-num {
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #FF6914;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .step a {
            color: #FF6914;
            text-decoration: underline;
        }

        .form-group {
            width: 100%;
            max-width: 360px;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #dddddd);
            border-radius: 12px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            border-color: #FF6914;
        }

        .form-group input::placeholder {
            color: var(--tg-theme-hint-color, #aaaaaa);
            font-size: 13px;
        }

        .btn-submit {
            width: 100%;
            max-width: 360px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background-color: #FF6914;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .btn-submit:active {
            opacity: 0.8;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            width: 100%;
            max-width: 360px;
            color: #e53935;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .success-msg {
            width: 100%;
            max-width: 360px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }

        .success-msg .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .success-msg .text {
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-text-color, #000000);
        }

        .success-msg .hint {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-top: 8px;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="logo">WINLINE <span>PARTNERS</span></div>

    <div class="steps">
        <div class="steps-title">Как получить токен:</div>
        <div class="step">
            <div class="step-num">1</div>
            <div>Войдите в <a href="https://iap-demo.admon.pro" target="_blank">личный кабинет</a> на платформе</div>
        </div>
        <div class="step">
            <div class="step-num">2</div>
            <div>Перейдите в настройки профиля</div>
        </div>
        <div class="step">
            <div class="step-num">3</div>
            <div>Скопируйте <b>Personal Access Token</b> и вставьте ниже</div>
        </div>
    </div>

    <div class="form-group">
        <label>Access Token</label>
        <input type="text" id="token" placeholder="eyJhbGciOiJIUzI1..." autocomplete="off">
    </div>

    <button class="btn-submit" id="submitBtn" onclick="doAuth()">Подтвердить</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="success-msg" id="successMsg">
        <div class="icon">&#10003;</div>
        <div class="text">Авторизация прошла успешно!</div>
        <div class="hint">Нажмите /start в боте</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const API_URL = 'https://wlpartners.site/auth';

        const tokenInput = document.getElementById('token');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        async function doAuth() {
            hideError();

            const token = tokenInput.value.trim();

            if (!token) {
                showError('Вставьте токен');
                return;
            }

            // Basic JWT format check
            if (token.split('.').length !== 3) {
                showError('Неверный формат токена');
                return;
            }

            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) {
                showError('Не удалось определить пользователя Telegram');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Проверка...';

            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, user_id: userId })
                });

                const data = await resp.json();

                if (resp.ok && data.ok) {
                    document.querySelector('.steps').style.display = 'none';
                    document.querySelector('.form-group').style.display = 'none';
                    submitBtn.style.display = 'none';
                    successMsg.style.display = 'block';

                    setTimeout(() => {
                        tg.sendData(JSON.stringify({ ok: true, email: data.email || '' }));
                    }, 1000);
                } else {
                    showError(data.error || 'Ошибка авторизации');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Подтвердить';
                }
            } catch (e) {
                showError('Ошибка подключения к серверу');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Подтвердить';
            }
        }

        tokenInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doAuth();
        });
    </script>
</body>
</html>
